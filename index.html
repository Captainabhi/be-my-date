<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Date? ❤️</title>
    <!-- Include EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6ea 0%, #ffb3c1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            color: #590d22;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #yesBtn, #submitBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover, #submitBtn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }

        #noBtn {
            background-color: #a4133c;
            color: white;
            position: absolute;
            transition: all 0.2s ease;
        }

        .hidden {
            display: none !important;
        }

        /* Form Controls for Success Screen */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #590d22;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .date-picker, .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            color: #590d22;
            background: white;
            transition: border-color 0.3s;
        }

        .date-picker:focus, .text-input:focus {
            border-color: #ff4d6d;
        }

        textarea.text-input {
            resize: none;
            height: 80px;
        }

        #submitBtn {
            width: 100%;
            margin-top: 10px;
        }

        /* Hidden YouTube Iframe Container */
        #yt-player-container {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Falling Hearts Animation */
        .heart {
            position: absolute;
            color: #ff758f;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Hidden YouTube Player Container (Change VIDEO_ID below to change the track) -->
    <div id="yt-player-container">
        <iframe id="yt-player" width="100" height="100" 
                src="https://www.youtube.com/embed/2Vv-BfVoq4g?enablejsapi=1&controls=0&loop=1" 
                allow="autoplay">
        </iframe>
    </div>

    <!-- Main Proposal Card -->
    <div class="container" id="proposalCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/w9zXzY9tV7MAAAAi/mocha-cute.gif" alt="Cute Bear">
        </div>
        <h1>Will you go out with me?</h1>
        <p>I promise it'll be unforgettable! ✨</p>
        <div class="btn-group">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn" style="left: 55%;">No</button>
        </div>
    </div>

    <!-- Success Screen & Form -->
    <div class="container hidden" id="successCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/X91Gf9G8v68AAAAi/bubu-dudu-bubu.gif" alt="Happy Bear">
        </div>
        <h1>YAYYYYY! 🥰</h1>
        <p>Let's make plans!</p>
        
        <div class="form-group">
            <label for="datePicker">Pick a day when you are free:</label>
            <input type="date" class="date-picker" id="datePicker">
        </div>

        <div class="form-group">
            <label for="dateDesc">What do you want this date to be?</label>
            <textarea class="text-input" id="dateDesc" placeholder="e.g., A cozy cafe coffee date, stargazing, or a long bike ride..."></textarea>
        </div>

        <button id="submitBtn">Send to Me ✨</button>
    </div>

    <script>
        // Initialize EmailJS with your Public Key
        emailjs.init("CJeIb1DApeLerxJxo"); 

        const proposalCard = document.getElementById('proposalCard');
        const successCard = document.getElementById('successCard');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const submitBtn = document.getElementById('submitBtn');
        
        let musicStarted = false;

        // Function to control YouTube iframe music playback
        function startMusic() {
            if (!musicStarted) {
                const iframe = document.getElementById('yt-player');
                // Posting playVideo message to YouTube Iframe API
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                musicStarted = true;
            }
        }

        // Runaway "No" Button logic
        function moveNoButton() {
            startMusic(); 
            const maxX = window.innerWidth - noBtn.offsetWidth - 40;
            const maxY = window.innerHeight - noBtn.offsetHeight - 40;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        // Click YES button
        yesBtn.addEventListener('click', () => {
            startMusic();
            proposalCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            startHeartRain();
        });

        // Form Submit Handler (Sends email using EmailJS)
        submitBtn.addEventListener('click', () => {
            const datePicked = document.getElementById('datePicker').value;
            const dateDescription = document.getElementById('dateDesc').value;

            if (!datePicked || !dateDescription) {
                alert("Please pick a day and tell me your dream date ideas! 😊");
                return;
            }

            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const templateParams = {
                date_picked: datePicked,
                date_description: dateDescription
            };

            // Send via EmailJS
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(() => {
                    successCard.innerHTML = `
                        <div class="gif-container">
                            <img src="https://media.tenor.com/034xV69uX74AAAAi/bubu-dudu-bubu.gif" alt="Love Bear">
                        </div>
                        <h1>It's a Date! ❤️</h1>
                        <p>Your choices have been sent directly to me. Can't wait! ✨</p>
                    `;
                }, (error) => {
                    console.error('Failed to send...', error);
                    alert("Oops! Something went wrong sending the email. Try again!");
                    submitBtn.innerText = "Send to Me ✨";
                    submitBtn.disabled = false;
                });
        });

        // Floating Hearts
        function startHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
