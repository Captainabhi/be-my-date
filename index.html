<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Date? ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #ffe6ea;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fullscreen Background Video Container */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 230, 234, 0.5) 0%, rgba(255, 179, 193, 0.6) 100%);
        }

        .video-background video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
            position: relative; /* CRITICAL: Serves as anchor boundary for absolute positions */
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            color: #590d22;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
            width: 100%;
        }

        button, .submit-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #yesBtn, .submit-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover, .submit-btn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }

        #noBtn {
            background-color: #a4133c;
            color: white;
            position: absolute;
            transition: left 0.15s ease, top 0.15s ease;
        }

        .hidden {
            display: none !important;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #590d22;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .date-picker, .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            color: #590d22;
            background: white;
        }

        .date-picker:focus, .text-input:focus {
            border-color: #ff4d6d;
        }

        textarea.text-input {
            resize: none;
            height: 80px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        .heart {
            position: fixed;
            color: #ff758f;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            opacity: 0;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container" id="proposalCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/w9zXzY9tV7MAAAAi/mocha-cute.gif" alt="Cute Bear">
        </div>
        <h1>Will you go out with me?</h1>
        <p>I promise it'll be unforgettable! ✨</p>
        <div class="btn-group" id="cardBtnGroup">
            <button id="yesBtn">Yes! 💖🌸</button>
            <button id="noBtn" style="left: 55%;">No 🥺</button>
        </div>
    </div>

    <div class="container hidden" id="successCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/X91Gf9G8v68AAAAi/bubu-dudu-bubu.gif" alt="Happy Bear">
        </div>
        <h1>YAYYYYY! 🥰</h1>
        <p>Let's make plans!</p>
        
        <form id="dateForm">
            <div class="form-group">
                <label for="datePicker">Pick a day when you are free:</label>
                <input type="date" class="date-picker" id="datePicker" name="Date Selected" required>
            </div>

            <div class="form-group">
                <label for="dateDesc">What do you want this date to be?</label>
                <textarea class="text-input" id="dateDesc" name="Dream Date Description" placeholder="e.g., A cozy cafe coffee date, stargazing..." required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Send to Me ✨</button>
        </form>
        <p id="formSuccess" style="display:none; color:#ff4d6d; font-weight:bold; margin-top:15px;">
            Sent! Can't wait 🥰🎉
        </p>
    </div>

    <script>
        const proposalCard = document.getElementById('proposalCard');
        const successCard = document.getElementById('successCard');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const cardBtnGroup = document.getElementById('cardBtnGroup');
        const bgVideo = document.getElementById('bgVideo');

        // Force play on load
        bgVideo.play().catch(() => {});

        // Unmute on first interaction
        function unmuteVideo() {
            bgVideo.muted = false;
            bgVideo.volume = 0.4;
            bgVideo.play().catch(() => {});
            document.removeEventListener('click', unmuteVideo);
            document.removeEventListener('touchstart', unmuteVideo);
        }
        document.addEventListener('click', unmuteVideo);
        document.addEventListener('touchstart', unmuteVideo);

        // Runaway "No" Button (Strictly trapped inside the white card container)
        function moveNoButton() {
            noBtn.innerHTML = "No 😭";

            // Move the button relative to the entire white card container instead of the body
            if (noBtn.parentNode !== proposalCard) {
                proposalCard.appendChild(noBtn);
            }

            // Get strict dimensions of the container box and button 
            const cardRect = proposalCard.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            const btnWidth = btnRect.width || 90;
            const btnHeight = btnRect.height || 45;

            // Define safe moving padding inside the white card margins
            const sidePadding = 20;
            const topPadding = 120; // Extra room at top to prevent cover up of text/GIFs

            // Calculate exact inner containment limits relative to white container top-left
            const maxX = cardRect.width - btnWidth - sidePadding;
            const maxY = cardRect.height - btnHeight - sidePadding;

            // Generate localized coordinates strictly locked inside the box walls
            const randomX = Math.floor(Math.random() * (maxX - sidePadding)) + sidePadding;
            const randomY = Math.floor(Math.random() * (maxY - topPadding)) + topPadding;

            // Apply absolute placement shifts safely inside the white wrapper box boundary
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Mouse and responsive mobile event setup
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents zoom/scroll on screens
            moveNoButton();
        });

        // Click YES button
        yesBtn.addEventListener('click', () => {
            proposalCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            startHeartRain();
        });

        // Form AJAX submit 
        document.getElementById('dateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending... 💌';
            try {
                await fetch('https://formspree.io/f/mgobowop', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    body: new FormData(e.target),
                });
            } catch (_) {}
            e.target.style.display = 'none';
            document.getElementById('formSuccess').style.display = 'block';
        });

        // Floating Hearts Animation
        function startHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
