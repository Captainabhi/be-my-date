<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Date? ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6ea 0%, #ffb3c1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            color: #590d22;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
        }

        button, .submit-btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #yesBtn, .submit-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover, .submit-btn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }

        #noBtn {
            background-color: #a4133c;
            color: white;
            position: absolute;
            transition: all 0.15s ease;
        }

        .hidden {
            display: none !important;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #590d22;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .date-picker, .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            color: #590d22;
            background: white;
        }

        .date-picker:focus, .text-input:focus {
            border-color: #ff4d6d;
        }

        textarea.text-input {
            resize: none;
            height: 80px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 10px;
            display: block;
        }

        .heart {
            position: absolute;
            color: #ff758f;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="proposalCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/w9zXzY9tV7MAAAAi/mocha-cute.gif" alt="Cute Bear">
        </div>
        <h1>Will you go out with me?</h1>
        <p>I promise it'll be unforgettable! ✨</p>
        <div class="btn-group">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn" style="left: 55%;">No</button>
        </div>
    </div>

    <div class="container hidden" id="successCard">
        <div class="gif-container">
            <img src="https://media.tenor.com/X91Gf9G8v68AAAAi/bubu-dudu-bubu.gif" alt="Happy Bear">
        </div>
        <h1>YAYYYYY! 🥰</h1>
        <p>Let's make plans!</p>
        
        <form action="https://formspree.io/f/mgobowop" method="POST" id="dateForm">
            <div class="form-group">
                <label for="datePicker">Pick a day when you are free:</label>
                <input type="date" class="date-picker" id="datePicker" name="Date Selected" required>
            </div>

            <div class="form-group">
                <label for="dateDesc">What do you want this date to be?</label>
                <textarea class="text-input" id="dateDesc" name="Dream Date Description" placeholder="e.g., A cozy cafe coffee date, stargazing..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send to Me ✨</button>
        </form>
    </div>

    <script>
        const proposalCard = document.getElementById('proposalCard');
        const successCard = document.getElementById('successCard');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const bgMusic = document.getElementById('bgMusic');
        
        let musicStarted = false;

        // Force browser to play the audio link upon any interaction
        function startMusic() {
            if (!musicStarted) {
                bgMusic.volume = 0.5;
                bgMusic.play()
                    .then(() => musicStarted = true)
                    .catch(err => console.log("Audio waiting for stronger interaction click."));
            }
        }

        // Runaway "No" Button logic
        function moveNoButton() {
            startMusic(); // Tries playing music when they hover/touch the No button
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 40;
            const maxY = window.innerHeight - noBtn.offsetHeight - 40;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        // Click YES button
        yesBtn.addEventListener('click', () => {
            startMusic(); // Absolutely triggers music here because it's a solid click event
            proposalCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            startHeartRain();
        });

        // Floating Hearts
        function startHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
